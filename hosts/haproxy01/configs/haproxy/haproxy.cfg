global
	log /dev/log	local0
	log /dev/log	local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

defaults
	log	global
	option	httplog
	option	dontlognull
        timeout connect 5s
        timeout client  30s
        timeout server  30s

frontend kube-apiserver
	bind 192.168.152.7:6443
	mode tcp
	option tcplog
	default_backend kube-apiserver

backend kube-apiserver
	mode tcp
	option tcp-check
	balance roundrobin
	default-server inter 10s downinter 5s rise 2 fall 2 slowstart 60s maxconn 250 maxqueue 256
	server k8scp01 192.168.152.8:6443 check
	server k8scp02 192.168.152.9:6443 check
	server k8scp03 192.168.152.10:6443 check

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:REDACTED

