global_defs {
  script_user root
  enable_script_security
}

vrrp_script chk_haproxy {
  script "/usr/bin/pgrep -x haproxy"
  interval 2
  fall 2
  rise 2
}
vrrp_instance VI_60 {
  state BACKUP
  interface ens33
  virtual_router_id 60
  priority 180
  advert_int 1
  authentication {
    auth_type PASS
    auth_pass REDACTED
  }
  unicast_src_ip 192.168.160.3
  unicast_peer { 192.168.160.2 }
  virtual_ipaddress { 192.168.160.4/24 }
  track_script { chk_haproxy }
}

