set -g default-terminal "screen-256color"
set -g escape-time 10
set -g mouse on
set -g set-clipboard on          # OSC 52 — pass clipboard signals to VS Code
set -g allow-passthrough on      # tmux 3.3+ — let VS Code Remote SSH clipboard through
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g status-right '%H:%M %d-%b'
bind r source-file ~/.tmux.conf \; display "Reloaded!"
# Split panes with | and -
bind | split-window -h
bind - split-window -v
