global
	log /dev/log	local0
	log /dev/log	local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

	# Default SSL material locations
	ca-base /etc/ssl/certs
	crt-base /etc/ssl/private

	# See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
        ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
        ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
        ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
	log	global
	mode	http
	option	httplog
	option	dontlognull
        timeout connect 5000
        timeout client  50000
        timeout server  50000
	errorfile 400 /etc/haproxy/errors/400.http
	errorfile 403 /etc/haproxy/errors/403.http
	errorfile 408 /etc/haproxy/errors/408.http
	errorfile 500 /etc/haproxy/errors/500.http
	errorfile 502 /etc/haproxy/errors/502.http
	errorfile 503 /etc/haproxy/errors/503.http
	errorfile 504 /etc/haproxy/errors/504.http

frontend ft_http
    bind *:80
    mode http
    option httplog
    # Redirect everything to HTTPS
    http-request redirect scheme https code 301 if !{ ssl_fc }

frontend ft_https
    bind *:443 ssl crt /etc/haproxy/certs/
    mode http
    option httplog
    option forwardfor
    # SNI / Host-based routing
    acl host_bluemap hdr(host) -i bluemap.vollminlab.com
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    use_backend bk_bluemap if host_bluemap
    # Default for unknown hosts (optional but nice)
    default_backend bk_404

backend bk_404
    mode http
    http-request return status 404 content-type "text/plain" string "Not found\n"

frontend ft_minecraft
        bind *:25565
        mode tcp
        option tcplog
        tcp-request inspect-delay 2s
        default_backend bk_minecraft
        stick-table type ip size 100k expire 30s store conn_rate(10s)
        tcp-request connection track-sc0 src
        acl too-fast sc0_conn_rate gt 100
        tcp-request connection reject if too-fast

backend bk_minecraft
        mode tcp
        option tcp-check
	balance roundrobin
        server mcnode05 192.168.152.15:32565 check inter 3000 fall 3 rise 2
	server mcnode06 192.168.152.16:32565 check inter 3000 fall 3 rise 2

backend bk_bluemap
        mode http
        option httpchk GET /
        http-check expect status 200
	balance roundrobin
        server bluemap05 192.168.152.15:32566 check inter 3000 fall 3 rise 2
	server bluemap06 192.168.152.16:32566 check inter 3000 fall 3 rise 2

listen stats
    	bind *:8404
    	mode http
    	stats enable
    	stats uri /stats
    	stats refresh 10s
    	stats auth admin:REDACTED

